<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <img src="images/missing_identity_disc.png" style="display:none;">

    <header>
      <h1>
        This is your Bit Pet
      </h1>
    </header>
    <audio id="sound-intro" src="sounds/derezzed.mp3"></audio>
<audio id="sound-happy" src="sounds/tron-bit-yes.mp3"></audio>
<audio id="sound-sad" src="sounds/tron-bit-no.mp3"></audio>
<audio id="sound-death" src="sounds/tron-bit-no.mp3"></audio>
    <main>
      <section class="pet-image-container">
        <img class="pet-image" src="images/Bit.webp">
      </section>
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
<div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
<div>Corruption: <strong><span class="corruption"></span> glitched sectors</strong></div>
        
        <div id="pet-comment" style="font-style: italic; margin-top: 10px; min-height: 20px;"></div>

        <div class="button-container">
      <button class="treat-button">Treat</button>
      <button class="play-button">Play</button>
       <button class="exercise-button">Exercise</button>
      <button class="nap-button">Nap</button>
      <button class="tron-button">Light Cycle</button>
     
</div>
 <button class="tron-button restart-button" style="display: none; margin-top: 20px;">
  Digitalize
</button>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
